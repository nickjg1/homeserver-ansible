---
# filebrowser/filebrowser:v2.57.1 changed its image layout. Entrypoint is now
# `tini -- /init.sh`, which seeds /config/settings.json from /defaults and execs
# `filebrowser --config=/config/settings.json`. The default settings.json is:
#   {"port":80,"baseURL":"","address":"","log":"stdout",
#    "database":"/database/filebrowser.db","root":"/srv"}
# So the DB lives under the /database DIRECTORY and config under /config, the old
# single-file `.../filebrowser.db:/database.db` mount no longer works. We run as the
# host user so it can write the mounted dirs, and pass NO command (the entrypoint
# handles everything; passing `filebrowser` caused the `unknown command` crash-loop).
- name: Ensure filebrowser config and database directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
  loop:
    - "{{ docker_dir }}/filebrowser/config"
    - "{{ docker_dir }}/filebrowser/database"

- name: Create file browser container
  community.docker.docker_container:
    name: filebrowser
    image: filebrowser/filebrowser:v2.57.1
    user: "{{ puid }}:{{ pgid }}"
    state: started
    networks:
      - name: homelab
    volumes:
      - "/home/{{ username }}/:/srv"
      - "{{ docker_dir }}/filebrowser/config:/config"
      - "{{ docker_dir }}/filebrowser/database:/database"
    restart_policy: unless-stopped
    security_opts:
      - no-new-privileges:true
    labels:
      traefik.enable: "true"
      traefik.http.routers.files.entrypoints: "http"
      traefik.http.routers.files.rule: "Host(`files.{{ domain }}`)"
      traefik.http.middlewares.files-https-redirect.redirectscheme.scheme: "https"
      traefik.http.routers.files.middlewares: "files-https-redirect"
      traefik.http.routers.files-secure.entrypoints: "https"
      traefik.http.routers.files-secure.rule: "Host(`files.{{ domain }}`)"
      traefik.http.routers.files-secure.tls: "true"
      traefik.http.routers.files-secure.service: "files"
      traefik.http.routers.files-secure.middlewares: "authelia@docker"
      traefik.http.services.files.loadbalancer.server.port: "80"
      traefik.docker.network: "homelab"
