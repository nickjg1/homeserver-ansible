---
- name: Create traefik data directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/traefik/data"
    state: directory
    mode: "0755"
    access_time: preserve
    modification_time: preserve

- name: Create acme.json file
  # Traefik refuses an ACME store more permissive than 0600 and silently skips
  # certificate issuance, so this file must be 0600 (owned by root).
  ansible.builtin.file:
    path: "{{ docker_dir }}/traefik/data/acme.json"
    state: touch
    owner: root
    group: root
    mode: "0600"

- name: Create traefik.yml config file
  ansible.builtin.copy:
    content: |
      api:
        dashboard: true
      entryPoints:
        http:
          address: ":80"
          http:
            redirections:
              entryPoint:
                to: "https"
                scheme: "https"
        https:
          address: ":443"
      providers:
        docker:
          # Read the Docker API via the read-only socket-proxy (GET-only), NOT the raw
          # /var/run/docker.sock — removes the host-root escape surface from the proxy.
          endpoint: "tcp://docker-socket-proxy:2375"
          exposedByDefault: false
        file:
          directory: /dynamic
          watch: true
      certificatesResolvers:
        cloudflare:
          acme:
            email: "{{ cloudflare_email }}"
            storage: "acme.json"
            dnsChallenge:
              provider: "cloudflare"
              resolvers:
                - "1.1.1.1:53"
                - "1.0.0.1:53"
    dest: "{{ docker_dir }}/traefik/data/traefik.yml"
    mode: "0644"
    owner: "{{ username }}"
    group: "{{ username }}"

- name: Create traefik dynamic config directory
  # Consumed by the file provider above (directory: /dynamic). Holds routes that
  # the docker provider cannot express — e.g. host-networked containers.
  ansible.builtin.file:
    path: "{{ docker_dir }}/traefik/data/dynamic"
    state: directory
    mode: "0755"
    owner: "{{ username }}"
    group: "{{ username }}"
    access_time: preserve
    modification_time: preserve

- name: Deploy Home Assistant dynamic route (file provider)
  # Home Assistant runs with network_mode: host, so Traefik's docker provider
  # cannot route to it (502). This file-provider router targets HA on the host
  # via host.docker.internal (mapped to host-gateway on the traefik container),
  # which is subnet-independent. Removing HA → delete this file.
  ansible.builtin.copy:
    content: |
      http:
        routers:
          homeassistant-host:
            rule: "Host(`homeassistant.{{ domain }}`)"
            entryPoints:
              - https
            middlewares:
              - authelia@docker
            service: homeassistant-host-svc
            priority: 1000
            tls: {}
        services:
          homeassistant-host-svc:
            loadBalancer:
              passHostHeader: true
              servers:
                - url: "http://host.docker.internal:8123"
    dest: "{{ docker_dir }}/traefik/data/dynamic/homeassistant.yml"
    mode: "0644"
    owner: "{{ username }}"
    group: "{{ username }}"

- name: Deploy traefik with docker container
  community.docker.docker_container:
    name: traefik
    image: traefik:v3.7.3
    restart_policy: unless-stopped
    state: started
    security_opts:
      - no-new-privileges:true
    networks:
      - name: homelab
    # Lets the file-provider routes reach host-networked services (e.g. Home
    # Assistant on :8123) via http://host.docker.internal, independent of the
    # docker bridge subnet.
    etc_hosts:
      host.docker.internal: host-gateway
    ports:
      - "80:80"
      - "443:443"

    # SECURITY: no raw /var/run/docker.sock mount — Traefik reaches the Docker API through
    # the read-only docker-socket-proxy (endpoint set in traefik.yml above), so a Traefik
    # compromise can no longer reach a writable socket = no host-root escape from the proxy.
    volumes:
      - "{{ docker_dir }}/traefik/data/acme.json:/acme.json"
      - "{{ docker_dir }}/traefik/data/traefik.yml:/traefik.yml:ro"
      - "{{ docker_dir }}/traefik/data/dynamic:/dynamic:ro"
    env:
      CF_DNS_API_TOKEN: "{{ cloudflare_dns_api_token }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik.entrypoints: "http"
      traefik.http.routers.traefik.rule: "Host(`traefik.{{ domain }}`)"
      traefik.http.middlewares.traefik-auth.basicauth.users: "{{ traefik_basic_auth_hash }}"
      traefik.http.middlewares.traefik-https-redirect.redirectscheme.scheme: "https"
      traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto: "https"
      traefik.http.routers.traefik.middlewares: "traefik-https-redirect"
      traefik.http.routers.traefik-secure.entrypoints: "https"
      traefik.http.routers.traefik-secure.rule: "Host(`traefik.{{ domain }}`)"
      traefik.http.routers.traefik-secure.middlewares: "traefik-auth"
      traefik.http.routers.traefik-secure.tls: "true"
      traefik.http.routers.traefik-secure.tls.certresolver: "cloudflare"
      traefik.http.routers.traefik-secure.tls.domains[0].main: "{{ domain }}"
      traefik.http.routers.traefik-secure.tls.domains[0].sans: "*.{{ domain }}"
      traefik.http.routers.traefik-secure.service: "api@internal"
