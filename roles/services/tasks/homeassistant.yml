---
- name: Create homeassistant container
  community.docker.docker_container:
    name: homeassistant
    image: lscr.io/linuxserver/homeassistant:2026.6.0-ls218
    env:
      PUID: "{{ puid | string }}"
      PGID: "{{ pgid | string }}"
      TZ: "{{ timezone }}"
    # Home Assistant needs host networking for device/mDNS discovery. Traefik's
    # docker provider cannot route to a host-network container (it can't infer a
    # container IP/port on the docker network), which produces a 502. Routing is
    # therefore handled by Traefik's FILE provider instead — see the
    # dynamic/homeassistant.yml router deployed in the traefik role. Do NOT add
    # traefik.* docker labels here; they are the 502 cause for host-networked HA.
    network_mode: host
    volumes:
      - "{{ docker_dir }}/homeassistant/config:/config"
    restart_policy: unless-stopped
    labels:
      traefik.enable: "false"
