---
- name: Create authelia config directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/authelia/config"
    state: directory
    mode: "0755"
    access_time: preserve
    modification_time: preserve

- name: Create authelia config file
  # M-5: rendered from a Jinja template so the role is the single source of truth and a
  # re-render can never drop live rules. access_control.rules = authelia_extra_rules
  # (host-specific, gitignored local.yml — PREPENDED) + authelia_base_rules (generic, below).
  vars:
    # Generic per-service access-control defaults (public template). Add/adjust hosts here.
    # Host-specific rules (personal apps, path-scoped API bypasses) live in
    # group_vars/all/local.yml as `authelia_extra_rules` and are prepended by the template.
    authelia_base_rules:
      - { domain: "code.{{ domain }}", policy: two_factor }
      - { domain: "dash.{{ domain }}", policy: two_factor }
      - { domain: "duplicati.{{ domain }}", policy: two_factor }
      - { domain: "files.{{ domain }}", policy: two_factor }
      - { domain: "guac.{{ domain }}", policy: two_factor }
      - { domain: "homarr.{{ domain }}", policy: two_factor }
      - { domain: "homeassistant.{{ domain }}", policy: two_factor }
      # bypass: Jellyfin has its own auth + native clients can't complete the Authelia portal.
      - { domain: "jellyfin.{{ domain }}", policy: bypass }
      # bypass: Seerr has its own Jellyfin-based login; gating it behind Authelia would lock
      # out external requesters without Authelia accounts.
      - { domain: "seerr.{{ domain }}", policy: bypass }
      - { domain: "grafana.{{ domain }}", policy: two_factor }
      - { domain: "n8n.{{ domain }}", policy: two_factor }
      - { domain: "nextcloud.{{ domain }}", policy: bypass }
      - { domain: "portainer.{{ domain }}", policy: two_factor }
      - { domain: "prowlarr.{{ domain }}", policy: two_factor }
      - { domain: "radarr.{{ domain }}", policy: two_factor }
      - { domain: "requestrr.{{ domain }}", policy: two_factor }
      - { domain: "sonarr.{{ domain }}", policy: two_factor }
      - { domain: "sync.{{ domain }}", policy: two_factor }
      - { domain: "traefik.{{ domain }}", policy: two_factor }
      - { domain: "unmanic.{{ domain }}", policy: two_factor }
      - { domain: "uptime.{{ domain }}", policy: two_factor }
      - { domain: "vault.{{ domain }}", policy: bypass }
      - { domain: "wg.{{ domain }}", policy: two_factor }
      - { domain: "transmission.{{ domain }}", policy: two_factor }
      - { domain: "pihole.{{ domain }}", policy: two_factor }
      - { domain: "sure.{{ domain }}", policy: two_factor }
  ansible.builtin.template:
    src: authelia-configuration.yml.j2
    dest: "{{ docker_dir }}/authelia/config/configuration.yml"
    mode: "0644"
    owner: "{{ username }}"
    group: "{{ username }}"
    # Never write an unparseable Authelia config (would break auth for every protected host).
    validate: "python3 -c 'import yaml,sys; yaml.safe_load(open(sys.argv[1]))' %s"
    backup: true
  register: authelia_config

- name: Create authelia users database file
  ansible.builtin.copy:
    content: |
      ---
      users:
        admin:
          displayname: admin
          email: "{{ authelia_admin_mail }}"
          password: "{{ authelia_admin_argon2id_pass }}"
          groups:
            - admins
            - dev
      ...
    dest: "{{ docker_dir }}/authelia/config/users_database.yml"
    mode: "0644"
    owner: "{{ username }}"
    group: "{{ username }}"
  changed_when: false

- name: Create authelia container
  community.docker.docker_container:
    name: authelia
    image: authelia/authelia:4.39.20
    state: started
    restart_policy: unless-stopped
    security_opts:
      - "no-new-privileges:true"
    volumes:
      - "{{ docker_dir }}/authelia/config:/config"
    networks:
      - name: homelab
    labels:
      traefik.enable: "true"
      traefik.http.routers.authelia.rule: "Host(`auth.{{ domain }}`)"
      traefik.http.routers.authelia.entrypoints: "https"
      traefik.http.routers.authelia.tls: "true"
      traefik.http.middlewares.authelia.forwardauth.address: "http://authelia:9091/api/verify?rd=https://auth.{{ domain }}"
      traefik.http.middlewares.authelia.forwardauth.trustForwardHeader: "true"
      traefik.http.middlewares.authelia.forwardauth.authResponseHeaders: "Remote-User, Remote-Groups, Remote-Name, Remote-Email"
    exposed_ports:
      - "9091"
    env:
      TZ: "{{ timezone }}"

# Authelia reads configuration.yml only at start, so a config change must restart it.
# (The original role relied on a manual/coach-deploy restart; this makes the role apply
# its own config changes — part of M-5 making the role authoritative.)
- name: Restart authelia to apply config changes
  community.docker.docker_container:
    name: authelia
    restart: true
  when: authelia_config is changed
