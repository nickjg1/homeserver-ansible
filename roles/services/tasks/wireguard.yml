---
- name: Create wireguard container
  community.docker.docker_container:
    name: wireguard
    # Maintained wg-easy v14 (the old weejewel/wg-easy was archived/3yr-stale). Pinned by digest.
    # NOTE: do NOT jump to v15 — it's a rewrite with a new config DB that does NOT read the
    # existing wg0.conf + wg0.json (would lose peers). v14 keeps that format.
    image: ghcr.io/wg-easy/wg-easy@sha256:5f26407fd2ede54df76d63304ef184576a6c1bb73f934a58a11abdd852fab549
    sysctls:
      "net.ipv4.ip_forward": "1"
      "net.ipv4.conf.all.src_valid_mark": "1"
    capabilities:
      - NET_ADMIN
      - SYS_MODULE
    state: started
    env:
      # v14+ REQUIRES a bcrypt PASSWORD_HASH — plaintext PASSWORD hard-errors at boot.
      # Generate one with:  docker run --rm ghcr.io/wg-easy/wg-easy:14 wgpw '<password>'
      "PASSWORD_HASH": "{{ wg_password_hash }}"
      "WG_HOST": "{{ ip_address }}"
    ports:
      - "51820:51820/udp"
    volumes:
      - "{{ docker_dir }}/wireguard/config:/etc/wireguard"
    restart_policy: unless-stopped
    security_opts:
      - "no-new-privileges:true"
    networks:
      - name: homelab
    labels:
      traefik.enable: "true"
      traefik.http.routers.wg.entrypoints: "http"
      traefik.http.routers.wg.rule: "Host(`wg.{{ domain }}`)"
      traefik.http.middlewares.wg-https-redirect.redirectscheme.scheme: "https"
      traefik.http.routers.wg.middlewares: "wg-https-redirect"
      traefik.http.routers.wg-secure.entrypoints: "https"
      traefik.http.routers.wg-secure.rule: "Host(`wg.{{ domain }}`)"
      traefik.http.routers.wg-secure.tls: "true"
      traefik.http.routers.wg-secure.service: "wg"
      traefik.http.routers.wg-secure.middlewares: "authelia@docker"
      traefik.http.services.wg.loadbalancer.server.port: "51821"
      traefik.docker.network: "homelab"
