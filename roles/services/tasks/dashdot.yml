---
- name: Create dashdot container
  community.docker.docker_container:
    name: dashdot
    image: mauricenino/dashdot:6.3.4
    restart_policy: unless-stopped
    state: started
    # SECURITY (2026-06-18): dashdot does NOT need --privileged. `privileged: true`
    # auto-implies `security-opt label=disable` + AppArmor-unconfined, which combined
    # with the host `/` bind below turned a dashdot compromise into a host-escape
    # primitive (container -> root on the host). Run it unprivileged with the host
    # mount kept read-only, ALL capabilities dropped, and no-new-privileges. Trade-off:
    # the SMART/disk-temperature widget may degrade without raw device access — fine.
    privileged: false
    cap_drop:
      - all
    security_opts:
      - "no-new-privileges:true"
    networks:
      - name: homelab
    volumes:
      - "/:/mnt/host:ro"
    env:
      DASHDOT_ACCEPT_OOKLA_EULA: "true"
    labels:
      traefik.enable: "true"
      traefik.http.routers.dash.entrypoints: "http"
      traefik.http.routers.dash.rule: "Host(`dash.{{ domain }}`)"
      traefik.http.middlewares.dash-https-redirect.redirectscheme.scheme: "https"
      traefik.http.routers.dash.middlewares: "dash-https-redirect"
      traefik.http.routers.dash-secure.entrypoints: "https"
      traefik.http.routers.dash-secure.rule: "Host(`dash.{{ domain }}`)"
      traefik.http.routers.dash-secure.tls: "true"
      traefik.http.routers.dash-secure.service: "dash"
      traefik.http.routers.dash-secure.middlewares: "authelia@docker"
      traefik.http.services.dash.loadbalancer.server.port: "3001"
      traefik.docker.network: "homelab"
